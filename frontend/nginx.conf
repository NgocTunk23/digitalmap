server {
    listen 80;
    server_name localhost;

    # Thư mục chứa các file đã build của React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Dòng quan trọng nhất: Nếu không tìm thấy file, hãy chuyển hướng về index.html
        try_files $uri $uri/ /index.html;
    }

    # Cấu hình nén Gzip để tải trang nhanh hơn trên server
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Cấu hình cache cho các file tĩnh (ảnh, font) để tăng tốc độ
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Quản lý lỗi server
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}